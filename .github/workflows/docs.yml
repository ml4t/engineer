name: Docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: "docs"
  cancel-in-progress: true

jobs:
  build:
    name: Build & Deploy Docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v8.3.2
        with:
          version: "0.10.9"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --python 3.12 --dev --extra docs

      - name: Build docs
        run: uv run mkdocs build --strict

      - name: Deploy to website repo
        uses: cpina/github-action-push-to-another-repository@55306faa4ed53b815ae49e564af8cfb359d32ae2 # v1.7.3
        env:
          SSH_DEPLOY_KEY: ${{ secrets.DOCS_DEPLOY_KEY }}
        with:
          source-directory: site/
          destination-github-username: ml4t
          destination-repository-name: website
          target-directory: static/docs/engineer/
          target-branch: main
          commit-message: "docs(engineer): update from ml4t/engineer@${{ github.sha }}"
          user-name: ml4t-bot
          user-email: bot@ml4trading.io
